<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Deep Marron/Crimson Circular Icon Base with subtle gold border -->
  <circle cx="32" cy="32" r="30" fill="#7F1D1D" stroke="#D97706" stroke-width="2"/>
  
  <!-- Sacred Third Eye (Chakkhudan / Trinayani Motif) -->
  <!-- Top Center Flame / Tilak -->
  <path d="M32 10 C35 17 38 20 32 26 C26 20 29 17 32 10 Z" fill="#DC2626" stroke="#FEF08A" stroke-width="1"/>
  <circle cx="32" cy="18" r="2.5" fill="#FEF08A"/>

  <!-- Eyebrows -->
  <path d="M12 27 C19 22 27 24 30 28" stroke="#FEF08A" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M52 27 C45 22 37 24 34 28" stroke="#FEF08A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Main Almond Eyes -->
  <!-- Left Eye -->
  <path d="M10 34 C17 24 29 30 30 34 C27 43 14 41 10 34 Z" fill="#FFFDF7" stroke="#FEF08A" stroke-width="1.5"/>
  <circle cx="21" cy="34" r="4.5" fill="#1E1B18"/>
  <circle cx="22.5" cy="33" r="1.5" fill="#FFFDF7"/>

  <!-- Right Eye -->
  <path d="M54 34 C47 24 35 30 34 34 C37 43 50 41 54 34 Z" fill="#FFFDF7" stroke="#FEF08A" stroke-width="1.5"/>
  <circle cx="43" cy="34" r="4.5" fill="#1E1B18"/>
  <circle cx="44.5" cy="33" r="1.5" fill="#FFFDF7"/>

  <!-- Nath / Nose Ring Motif -->
  <circle cx="32" cy="45" r="5" stroke="#FEF08A" stroke-width="1.5" fill="none"/>
  <circle cx="37" cy="45" r="1.5" fill="#DC2626"/>
</svg>
